<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>迷宫通道绘制器 · 圆点可调 150-500px · 小地图</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      text-align: center;
      overflow-x: auto;
    }
    h1 { margin-bottom: 10px; color: #7af; }
    .info {
      margin-bottom: 15px;
      color: #aaa;
      font-size: 14px;
    }
    .main-layout {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }
    .canvas-area {
      flex-shrink: 0;
    }
    .canvas-container {
      position: relative;
      width: 800px;
      height: 800px;
      border: 2px dashed #666;
      background: #111;
      overflow: hidden;
      cursor: grab;
    }
    .canvas-container:active {
      cursor: grabbing;
    }
    #mazeCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: black;
      transform-origin: 0 0;
      pointer-events: none;
    }
    .minimap-container {
      width: 200px;
      height: 200px;
      border: 2px solid #444;
      background: #000;
      position: relative;
      cursor: crosshair;
    }
    #minimapCanvas {
      display: block;
      width: 100%;
      height: 100%;
      background: black;
    }
    .viewfinder {
      position: absolute;
      border: 2px solid #ffaa00;
      box-sizing: border-box;
      pointer-events: none;
      z-index: 10;
      box-shadow: 0 0 5px rgba(255,170,0,0.5);
    }
    .controls {
      margin-top: 20px;
    }
    button {
      background: #222;
      color: #fff;
      border: 1px solid #444;
      padding: 8px 16px;
      margin: 0 5px;
      cursor: pointer;
      font-size: 14px;
    }
    button:hover { background: #333; }
    .status {
      margin-top: 10px;
      font-size: 14px;
      color: #bbf;
    }
    .note {
      margin-top: 8px;
      font-size: 13px;
      color: #f96;
    }
    .coords {
      font-size: 13px;
      color: #8cf;
      margin-top: 5px;
    }
    .size-control {
      margin: 15px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      max-width: 600px;
      background: #222;
      padding: 10px 20px;
      border-radius: 30px;
    }
    #sizeSlider {
      width: 300px;
      cursor: pointer;
    }
    #sizeValue {
      min-width: 80px;
      text-align: left;
      color: #ffaa4f;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <h1>🎯 迷宫通道绘制器 · 可调圆点大小</h1>
  <div class="info">主画布正常比例 | 小地图预览 | 圆点直径可调 150px ~ 500px</div>

  <div class="size-control">
    <span>⚪ 圆点直径</span>
    <input type="range" id="sizeSlider" min="150" max="500" step="10" value="150">
    <span id="sizeValue">150 px</span>
  </div>

  <div class="main-layout">
    <!-- 左侧主画布区域 -->
    <div class="canvas-area">
      <div class="canvas-container" id="canvasContainer">
        <canvas id="mazeCanvas" width="5000" height="5000"></canvas>
      </div>
      <div class="coords" id="coordsDisplay">画布坐标: (—, —)</div>
    </div>

    <!-- 右侧小地图区域 -->
    <div class="minimap-container" id="minimapContainer">
      <canvas id="minimapCanvas" width="5000" height="5000"></canvas>
      <div class="viewfinder" id="viewfinder"></div>
    </div>
  </div>

  <div class="controls">
    <button id="clearBtn">🖤 重置全黑</button>
    <button id="saveBtn">💾 保存 PNG (透明通道)</button>
    <button id="downloadBtn">⬇️ 下载 maze.png</button>
  </div>
  <div class="status" id="status">已创建 <span id="channelCount">0</span> 个通道点</div>
  <div class="note" id="hint">✨ 左键点击添加圆点 | 小地图橙色框为视野 | 点击小地图跳转 | 滑块调节圆点大小</div>

  <script>
    (function() {
      // 主画布
      const canvas = document.getElementById('mazeCanvas');
      const ctx = canvas.getContext('2d', { alpha: true });
      const container = document.getElementById('canvasContainer');

      // 小地图
      const minimapCanvas = document.getElementById('minimapCanvas');
      const minimapCtx = minimapCanvas.getContext('2d', { alpha: true });
      const minimapContainer = document.getElementById('minimapContainer');
      const viewfinder = document.getElementById('viewfinder');

      // 存储所有圆点中心坐标 (每个点独立，但绘制时使用当前半径)
      let points = [];
      let channelCount = 0;

      // 当前圆点半径 (直径通过滑块控制)
      let currentRadius = 75; // 默认150直径 => 半径75

      // 主画布平移状态
      let translateX = 0, translateY = 0;
      const canvasSize = 5000;
      const containerSize = 800;

      // 拖动相关
      let isDragging = false;
      let dragStartX = 0, dragStartY = 0;
      let startTranslateX = 0, startTranslateY = 0;

      // 状态元素
      const statusCount = document.getElementById('channelCount');
      const statusEl = document.getElementById('status');
      const hintEl = document.getElementById('hint');
      const coordsDisplay = document.getElementById('coordsDisplay');
      const sizeSlider = document.getElementById('sizeSlider');
      const sizeValue = document.getElementById('sizeValue');

      // 初始化：全黑背景
      function initBlackBackground() {
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        points = [];
        channelCount = 0;
        updateStatus();
        updateMinimap();
        updateViewfinder();
      }

      // 绘制所有圆点到主画布 (使用当前半径)
      function redrawMainCanvas() {
        ctx.fillStyle = 'black';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = 'white';
        for (let p of points) {
          ctx.beginPath();
          ctx.arc(p.x, p.y, currentRadius, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // 更新小地图 (也使用当前半径)
      function updateMinimap() {
        minimapCtx.fillStyle = 'black';
        minimapCtx.fillRect(0, 0, minimapCanvas.width, minimapCanvas.height);

        minimapCtx.fillStyle = 'white';
        for (let p of points) {
          minimapCtx.beginPath();
          minimapCtx.arc(p.x, p.y, currentRadius, 0, Math.PI * 2);
          minimapCtx.fill();
        }
      }

      // 更新取景框位置
      function updateViewfinder() {
        const maxTranslateX = canvasSize - containerSize;
        const maxTranslateY = canvasSize - containerSize;
        translateX = Math.max(0, Math.min(maxTranslateX, translateX));
        translateY = Math.max(0, Math.min(maxTranslateY, translateY));

        const mapScale = 200 / canvasSize; // 0.04
        const viewfinderX = translateX * mapScale;
        const viewfinderY = translateY * mapScale;
        const viewfinderWidth = containerSize * mapScale; // 32px
        const viewfinderHeight = containerSize * mapScale;

        viewfinder.style.left = viewfinderX + 'px';
        viewfinder.style.top = viewfinderY + 'px';
        viewfinder.style.width = viewfinderWidth + 'px';
        viewfinder.style.height = viewfinderHeight + 'px';

        canvas.style.transform = `translate(${-translateX * (containerSize/canvasSize)}px, ${-translateY * (containerSize/canvasSize)}px) scale(1)`;
        canvas.style.width = '800px';
        canvas.style.height = '800px';
      }

      // 添加新点
      function addPoint(centerX, centerY) {
        if (centerX < 0 || centerX > canvas.width || centerY < 0 || centerY > canvas.height) return;
        points.push({ x: centerX, y: centerY });

        // 直接绘制到主画布 (使用当前半径)
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(centerX, centerY, currentRadius, 0, Math.PI * 2);
        ctx.fill();

        // 更新小地图
        updateMinimap();

        channelCount++;
        updateStatus();
        hintEl.innerHTML = `➕ 在 (${Math.round(centerX)}, ${Math.round(centerY)}) 添加直径 ${currentRadius*2}px 圆点`;
        setTimeout(() => {
          hintEl.innerHTML = '✨ 左键点击添加圆点 | 小地图橙色框为视野 | 点击小地图跳转 | 滑块调节圆点大小';
        }, 2000);
      }

      // 更新计数
      function updateStatus() {
        statusCount.textContent = channelCount;
        statusEl.innerHTML = `已创建 <span id="channelCount">${channelCount}</span> 个通道点 (直径 ${currentRadius*2}px)`;
      }

      // 获取主画布上的实际坐标
      function getCanvasCoordsFromEvent(e) {
        const rect = container.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const visibleX = (mouseX / containerSize) * canvasSize;
        const visibleY = (mouseY / containerSize) * canvasSize;

        const canvasX = visibleX + translateX;
        const canvasY = visibleY + translateY;

        return { x: Math.max(0, Math.min(canvasSize, canvasX)), y: Math.max(0, Math.min(canvasSize, canvasY)) };
      }

      // 主画布鼠标事件
      container.addEventListener('mousedown', (e) => {
        if (e.button === 0) {
          isDragging = true;
          dragStartX = e.clientX;
          dragStartY = e.clientY;
          startTranslateX = translateX;
          startTranslateY = translateY;
          container.style.cursor = 'grabbing';
        }
      });

      container.addEventListener('mousemove', (e) => {
        const canvasCoords = getCanvasCoordsFromEvent(e);
        coordsDisplay.textContent = `画布坐标: (${Math.round(canvasCoords.x)}, ${Math.round(canvasCoords.y)})`;

        if (isDragging) {
          e.preventDefault();
          const dx = e.clientX - dragStartX;
          const dy = e.clientY - dragStartY;
          const deltaX = -dx * (canvasSize / containerSize);
          const deltaY = -dy * (canvasSize / containerSize);
          translateX = startTranslateX + deltaX;
          translateY = startTranslateY + deltaY;

          const maxTranslateX = canvasSize - containerSize;
          const maxTranslateY = canvasSize - containerSize;
          translateX = Math.max(0, Math.min(maxTranslateX, translateX));
          translateY = Math.max(0, Math.min(maxTranslateY, translateY));

          updateViewfinder();
        }
      });

      container.addEventListener('mouseup', (e) => {
        if (e.button === 0 && isDragging) {
          isDragging = false;
          container.style.cursor = 'grab';
        }
      });

      container.addEventListener('mouseleave', (e) => {
        if (isDragging) {
          isDragging = false;
          container.style.cursor = 'grab';
        }
      });

      // 左键点击绘制 (排除拖拽)
      let clickStartTime = 0;
      container.addEventListener('mousedown', (e) => {
        if (e.button === 0) {
          clickStartTime = Date.now();
        }
      });

      container.addEventListener('mouseup', (e) => {
        if (e.button === 0 && !isDragging) {
          const clickDuration = Date.now() - clickStartTime;
          if (clickDuration < 200) {
            const canvasCoords = getCanvasCoordsFromEvent(e);
            addPoint(canvasCoords.x, canvasCoords.y);
          }
        }
      });

      // 小地图点击跳转
      minimapContainer.addEventListener('click', (e) => {
        const rect = minimapContainer.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;

        const mapScale = canvasSize / 200;
        const targetX = x * mapScale;
        const targetY = y * mapScale;

        translateX = targetX - containerSize / 2;
        translateY = targetY - containerSize / 2;

        const maxTranslateX = canvasSize - containerSize;
        const maxTranslateY = canvasSize - containerSize;
        translateX = Math.max(0, Math.min(maxTranslateX, translateX));
        translateY = Math.max(0, Math.min(maxTranslateY, translateY));

        updateViewfinder();
      });

      // 小地图拖拽跳转
      let isMinimapDragging = false;
      minimapContainer.addEventListener('mousedown', (e) => {
        isMinimapDragging = true;
      });

      minimapContainer.addEventListener('mousemove', (e) => {
        if (isMinimapDragging) {
          const rect = minimapContainer.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          if (x >= 0 && x <= 200 && y >= 0 && y <= 200) {
            const mapScale = canvasSize / 200;
            const targetX = x * mapScale;
            const targetY = y * mapScale;
            translateX = targetX - containerSize / 2;
            translateY = targetY - containerSize / 2;
            const maxTranslateX = canvasSize - containerSize;
            const maxTranslateY = canvasSize - containerSize;
            translateX = Math.max(0, Math.min(maxTranslateX, translateX));
            translateY = Math.max(0, Math.min(maxTranslateY, translateY));
            updateViewfinder();
          }
        }
      });

      minimapContainer.addEventListener('mouseup', () => {
        isMinimapDragging = false;
      });

      minimapContainer.addEventListener('mouseleave', () => {
        isMinimapDragging = false;
      });

      // 滑块调节圆点大小
      sizeSlider.addEventListener('input', (e) => {
        const diameter = parseInt(e.target.value);
        currentRadius = diameter / 2;
        sizeValue.textContent = diameter + ' px';

        // 重绘主画布和小地图以新尺寸显示所有点
        redrawMainCanvas();
        updateMinimap();
        updateStatus(); // 更新状态中的直径显示
      });

      // 重置全黑
      document.getElementById('clearBtn').addEventListener('click', () => {
        initBlackBackground();
        hintEl.innerHTML = '🖤 已重置为全黑背景';
        setTimeout(() => {
          hintEl.innerHTML = '✨ 左键点击添加圆点 | 小地图橙色框为视野 | 点击小地图跳转 | 滑块调节圆点大小';
        }, 2000);
      });

      // 导出PNG（白色→透明，黑色保留）- 使用当前半径绘制导出图
      function exportWithTransparentChannels(filename) {
        const offCanvas = document.createElement('canvas');
        offCanvas.width = canvas.width;
        offCanvas.height = canvas.height;
        const offCtx = offCanvas.getContext('2d', { alpha: true });

        offCtx.fillStyle = 'black';
        offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);

        offCtx.save();
        offCtx.globalCompositeOperation = 'destination-out';
        offCtx.fillStyle = 'white';
        for (let p of points) {
          offCtx.beginPath();
          offCtx.arc(p.x, p.y, currentRadius, 0, Math.PI * 2);
          offCtx.fill();
        }
        offCtx.restore();

        offCanvas.toBlob(blob => {
          if (!blob) return;
          const url = URL.createObjectURL(blob);
          const link = document.createElement('a');
          link.href = url;
          link.download = filename;
          link.click();
          URL.revokeObjectURL(url);
          alert(`✅ 已下载 ${filename} (5000×5000，黑色墙体，透明通道，圆点直径 ${currentRadius*2}px)`);
        }, 'image/png');
      }

      document.getElementById('saveBtn').addEventListener('click', () => {
        exportWithTransparentChannels('map_plain.png');
      });

      document.getElementById('downloadBtn').addEventListener('click', () => {
        exportWithTransparentChannels('maze.png');
      });

      // 初始
      initBlackBackground();
      container.style.cursor = 'grab';
      updateViewfinder();

      // 滑块初始值显示
      sizeValue.textContent = '150 px';
    })();
  </script>
</body>
</html>
