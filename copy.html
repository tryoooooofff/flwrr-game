
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flower Game - 多人联机版</title>
<!-- 添加 PeerJS 用于 WebRTC 连接 -->
<script src="https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(135deg, #1a1a2e, #16213e);
  color: white;
}
#gameCanvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 1000;
  cursor: default;
}
/* 多人游戏面板样式 */
#multiplayer-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(20, 30, 40, 0.95);
  border: 2px solid #00a8ff;
  border-radius: 10px;
  padding: 30px;
  color: white;
  z-index: 2000;
  display: none;
  min-width: 400px;
  text-align: center;
  box-shadow: 0 0 30px rgba(0, 168, 255, 0.5);
}
#multiplayer-panel h2 {
  color: #00a8ff;
  margin-bottom: 20px;
}
#multiplayer-panel input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #1a2a3a;
  border: 1px solid #00a8ff;
  color: white;
  border-radius: 5px;
  font-size: 18px;
  text-align: center;
}
#multiplayer-panel button {
  background: #00a8ff;
  color: white;
  border: none;
  padding: 12px 24px;
  margin: 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
  min-width: 150px;
  transition: 0.3s;
}
#multiplayer-panel button:hover {
  background: #0080ff;
  transform: scale(1.05);
}
#multiplayer-panel button.cancel {
  background: #e74c3c;
}
#multiplayer-panel button.cancel:hover {
  background: #c0392b;
}
#multiplayer-panel .room-code {
  font-size: 48px;
  font-family: monospace;
  color: #ffd700;
  margin: 20px;
  padding: 10px;
  background: #1a2a3a;
  border-radius: 5px;
  letter-spacing: 5px;
}
#multiplayer-panel .link-box {
  background: #1a2a3a;
  padding: 10px;
  border-radius: 5px;
  margin: 10px 0;
  word-break: break-all;
  font-family: monospace;
  color: #00ff00;
}

/* 账号面板样式 */
#account-panel {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(20, 30, 40, 0.95);
  border: 2px solid #f1c40f;
  border-radius: 10px;
  padding: 30px;
  color: white;
  z-index: 2100;
  display: none;
  min-width: 400px;
  text-align: center;
  box-shadow: 0 0 30px rgba(241, 196, 15, 0.5);
}
#account-panel h2 {
  color: #f1c40f;
  margin-bottom: 20px;
}
#account-panel input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  background: #1a2a3a;
  border: 1px solid #f1c40f;
  color: white;
  border-radius: 5px;
  font-size: 18px;
}
#account-panel button {
  background: #f1c40f;
  color: black;
  border: none;
  padding: 12px 24px;
  margin: 10px;
  border-radius: 5px;
  cursor: pointer;
  font-size: 16px;
  min-width: 150px;
  transition: 0.3s;
  font-weight: bold;
}
#account-panel button:hover {
  background: #d4ac0d;
  transform: scale(1.05);
}
#account-panel button.cancel {
  background: #e74c3c;
  color: white;
}
#account-panel button.cancel:hover {
  background: #c0392b;
}
#account-panel .message {
  margin-top: 15px;
  padding: 10px;
  border-radius: 5px;
  font-size: 14px;
}
#account-panel .message.success {
  background: rgba(46, 204, 113, 0.3);
  color: #2ecc71;
  border: 1px solid #2ecc71;
}
#account-panel .message.error {
  background: rgba(231, 76, 60, 0.3);
  color: #e74c3c;
  border: 1px solid #e74c3c;
}
#account-panel .input-label {
  text-align: left;
  margin-top: 10px;
  margin-bottom: 5px;
  color: #bdc3c7;
  font-size: 14px;
}
#account-panel .password-toggle {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  cursor: pointer;
  color: #f1c40f;
  font-size: 20px;
  user-select: none;
}
#account-panel .password-toggle:hover {
  color: #d4ac0d;
}
#account-panel .input-wrapper {
  position: relative;
  width: 100%;
}

/* 房间信息显示 */
#room-info {
  position: fixed;
  top: 10px;
  right: 10px;
  color: #00ff00;
  font-size: 14px;
  z-index: 1001;
  background: rgba(0,0,0,0.7);
  padding: 8px 15px;
  border-radius: 20px;
  border: 1px solid #00ff00;
  pointer-events: none;
}

/* 当前用户显示 */
#current-user {
  position: fixed;
  top: 10px;
  left: 10px;
  color: #f1c40f;
  font-size: 14px;
  z-index: 1001;
  background: rgba(0,0,0,0.7);
  padding: 8px 15px;
  border-radius: 20px;
  border: 1px solid #f1c40f;
  pointer-events: none;
  display: none;
}
</style>
</head>
<body>
    <canvas id="gameCanvas" width="1550" height="850"></canvas>

    <!-- 房间信息显示 -->
    <div id="room-info" style="display: none;"></div>

    <!-- 当前用户显示 -->
    <div id="current-user" style="display: none;"></div>

    <!-- 多人游戏面板 -->
    <div id="multiplayer-panel">
        <h2>👥 多人游戏</h2>
        <div id="mp-menu">
            <button onclick="showCreateRoom()">🎮 创建房间</button>
            <button onclick="showJoinRoom()">🔑 加入房间</button>
            <button class="cancel" onclick="hideMultiplayerPanel()">❌ 返回</button>
        </div>
        <div id="mp-create" style="display: none;">
            <h3>创建房间</h3>
            <div id="room-code-display" class="room-code">------</div>
            <div id="room-link-display" class="link-box"></div>
            <button onclick="copyRoomLink()">📋 复制链接</button>
            <button class="cancel" onclick="backToMenu()">↩️ 返回</button>
        </div>
        <div id="mp-join" style="display: none;">
            <h3>加入房间</h3>
            <input type="text" id="room-code-input" placeholder="输入6位房间号" maxlength="6" autocomplete="off">
            <button onclick="joinRoom()">✅ 加入</button>
            <button class="cancel" onclick="backToMenu()">↩️ 返回</button>
            <p id="join-error" style="color: #ff6b6b; margin-top: 10px;"></p>
        </div>
    </div>

    <!-- 账号面板 -->
    <div id="account-panel">
        <h2>👤 账号系统</h2>
        <div id="account-menu">
            <button onclick="showAccountLogin()">🔑 登录</button>
            <button onclick="showAccountRegister()">📝 注册</button>
            <button class="cancel" onclick="hideAccountPanel()">❌ 关闭</button>
        </div>

        <!-- 登录界面 -->
        <div id="account-login" style="display: none;">
            <h3>登录</h3>
            <div class="input-label">用户名</div>
            <input type="text" id="login-username" placeholder="输入用户名" maxlength="20" autocomplete="off">
            <div class="input-label">密码</div>
            <div style="position: relative;">
                <input type="password" id="login-password" placeholder="输入密码" maxlength="20" style="width: 100%; padding-right: 40px;">
                <span onclick="togglePasswordVisibility('login-password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #f1c40f; font-size: 20px;">👁️</span>
            </div>
            <button onclick="handleLogin()">✅ 登录</button>
            <button class="cancel" onclick="backToAccountMenu()">↩️ 返回</button>
            <div id="login-message" class="message" style="display: none;"></div>
        </div>

        <!-- 注册界面 -->
        <div id="account-register" style="display: none;">
            <h3>注册新账号</h3>
            <div class="input-label">用户名 (3-20字符)</div>
            <input type="text" id="register-username" placeholder="输入用户名" maxlength="20" autocomplete="off">
            <div class="input-label">密码 (3-20字符)</div>
            <div style="position: relative;">
                <input type="password" id="register-password" placeholder="输入密码" maxlength="20" style="width: 100%; padding-right: 40px;">
                <span onclick="togglePasswordVisibility('register-password')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #f1c40f; font-size: 20px;">👁️</span>
            </div>
            <div class="input-label">确认密码</div>
            <div style="position: relative;">
                <input type="password" id="register-confirm" placeholder="再次输入密码" maxlength="20" style="width: 100%; padding-right: 40px;">
                <span onclick="togglePasswordVisibility('register-confirm')" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); cursor: pointer; color: #f1c40f; font-size: 20px;">👁️</span>
            </div>
            <button onclick="handleRegister()">📝 注册</button>
            <button class="cancel" onclick="backToAccountMenu()">↩️ 返回</button>
            <div id="register-message" class="message" style="display: none;"></div>
        </div>

        <!-- 已登录界面 -->
        <div id="account-loggedin" style="display: none;">
            <h3>已登录</h3>
            <div id="loggedin-username" style="font-size: 24px; margin: 20px; color: #f1c40f;"></div>
            <button onclick="handleLogout()">🚪 登出</button>
            <button class="cancel" onclick="hideAccountPanel()">❌ 关闭</button>
        </div>
    </div>

    <script type="module">
    // ==================== 导入 game.js 模块 ====================
    import {
      QuickSlot,
      Item,
      Inventory,
      StarCraftUI,
      RARITY_LIST,
      RARITY_COLORS,
      ARMOR_ELIGIBLE_ITEMS,
      ITEM_ARMOR_VALUES,
      WorldMapGame,
      ImageLoader,
      ProbabilityCalculator,
      CraftAnimation
    } from './copy.js';

    // ===== 全局变量 =====
    let screen = null;
    let ctx = null;
    let gameState = 'main_menu';
    let gameInstance = null;
    let controlsInitialized = false;
    let animationFrameId = null;

    // 鼠标移动相关变量
    let mouseTargetX = null;
    let mouseTargetY = null;
    let isMouseMoving = false;
    const MOUSE_MOVE_SPEED = 5;

    // 编辑器模式标志
    let editorMode = false;

    // 初始化 ImageLoader
    const imageLoader = ImageLoader.getInstance();
    window.imageLoader = imageLoader;

    // 设置全局常量
    window.RARITY_LIST = RARITY_LIST;
    window.RARITY_COLORS = RARITY_COLORS;
    window.WIDTH = window.innerWidth;
    window.HEIGHT = window.innerHeight;

    // ===== URL参数解析 =====
    (function() {
        try {
            const urlParams = new URLSearchParams(window.location.search);
            const roomCode = urlParams.get('room');

            window.URL_PARAMS = {
                roomCode: roomCode
            };

            console.log('📋 URL参数:', window.URL_PARAMS);

        } catch (e) {
            console.error('URL参数解析失败:', e);
            window.URL_PARAMS = { roomCode: null };
        }
    })();

    // ===== 切换密码可见性 =====
    window.togglePasswordVisibility = function(inputId) {
        const input = document.getElementById(inputId);
        if (input) {
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }
    };

    // ===== 多人游戏面板控制 =====
    window.showMultiplayerPanel = function() {
        const panel = document.getElementById('multiplayer-panel');
        const menu = document.getElementById('mp-menu');
        const create = document.getElementById('mp-create');
        const join = document.getElementById('mp-join');

        if (panel) panel.style.display = 'block';
        if (menu) menu.style.display = 'block';
        if (create) create.style.display = 'none';
        if (join) join.style.display = 'none';
    };

    window.hideMultiplayerPanel = function() {
        const panel = document.getElementById('multiplayer-panel');
        if (panel) panel.style.display = 'none';
    };

    window.showCreateRoom = async function() {
        const menu = document.getElementById('mp-menu');
        const create = document.getElementById('mp-create');

        if (menu) menu.style.display = 'none';
        if (create) create.style.display = 'block';

        if (!gameInstance) {
            gameInstance = createGameInstance();
        }

        try {
            const roomCode = await gameInstance.createMultiplayerRoom();
            const roomCodeDisplay = document.getElementById('room-code-display');
            const roomLinkDisplay = document.getElementById('room-link-display');

            if (roomCodeDisplay) roomCodeDisplay.textContent = roomCode;

            const baseUrl = window.location.href.split('?')[0];
            const roomLink = `${baseUrl}?room=${roomCode}`;
            if (roomLinkDisplay) roomLinkDisplay.textContent = roomLink;

            // 更新房间信息显示
            const roomInfo = document.getElementById('room-info');
            if (roomInfo) {
                roomInfo.style.display = 'block';
                roomInfo.innerHTML = `🎮 房间: ${roomCode} | 等待玩家加入...`;
            }

        } catch (error) {
            console.error('创建房间失败:', error);
            alert('创建房间失败: ' + error.message);
            backToMenu();
        }
    };

    window.showJoinRoom = function() {
        const menu = document.getElementById('mp-menu');
        const join = document.getElementById('mp-join');
        const input = document.getElementById('room-code-input');

        if (menu) menu.style.display = 'none';
        if (join) join.style.display = 'block';
        if (input) input.focus();
    };

    window.backToMenu = function() {
        const menu = document.getElementById('mp-menu');
        const create = document.getElementById('mp-create');
        const join = document.getElementById('mp-join');
        const error = document.getElementById('join-error');

        if (menu) menu.style.display = 'block';
        if (create) create.style.display = 'none';
        if (join) join.style.display = 'none';
        if (error) error.textContent = '';
    };

    window.copyRoomLink = function() {
        const link = document.getElementById('room-link-display');
        if (link) {
            navigator.clipboard.writeText(link.textContent);
            alert('✅ 链接已复制到剪贴板！');
        }
    };

    window.joinRoom = async function() {
        const input = document.getElementById('room-code-input');
        const error = document.getElementById('join-error');

        if (!input) return;

        const roomCode = input.value.toUpperCase();
        if (roomCode.length < 4) {
            if (error) error.textContent = '请输入有效的房间号';
            return;
        }

        if (!gameInstance) {
            gameInstance = createGameInstance();
        }

        try {
            await gameInstance.joinMultiplayerRoom(roomCode);
            hideMultiplayerPanel();

            // 更新房间信息显示
            const roomInfo = document.getElementById('room-info');
            if (roomInfo) {
                roomInfo.style.display = 'block';
                roomInfo.innerHTML = `🎮 房间: ${roomCode} | 已加入`;
            }

            // 自动开始游戏
            startGame('Plain');

        } catch (error) {
            console.error('加入房间失败:', error);
            if (error) error.textContent = '加入失败: ' + error.message;
        }
    };

    // ===== 账号面板控制 =====
    window.showAccountPanel = function() {
        console.log('🔍 显示账号面板');

        const accountPanel = document.getElementById('account-panel');
        const accountMenu = document.getElementById('account-menu');
        const accountLogin = document.getElementById('account-login');
        const accountRegister = document.getElementById('account-register');
        const accountLoggedin = document.getElementById('account-loggedin');

        if (!accountPanel) {
            console.error('❌ 找不到 account-panel 元素');
            return;
        }
        if (!accountMenu) {
            console.error('❌ 找不到 account-menu 元素');
            return;
        }

        accountPanel.style.display = 'block';
        accountMenu.style.display = 'block';
        if (accountLogin) accountLogin.style.display = 'none';
        if (accountRegister) accountRegister.style.display = 'none';
        if (accountLoggedin) accountLoggedin.style.display = 'none';

        clearAccountMessages();

        // 如果已登录，显示登录状态
        if (gameInstance && gameInstance.accountSystem && gameInstance.accountSystem.isLoggedIn()) {
            showLoggedInStatus();
        }
    };

    window.hideAccountPanel = function() {
        const accountPanel = document.getElementById('account-panel');
        if (accountPanel) {
            accountPanel.style.display = 'none';
        }
        clearAccountMessages();
    };

    window.showAccountLogin = function() {
        const accountMenu = document.getElementById('account-menu');
        const accountLogin = document.getElementById('account-login');
        const accountRegister = document.getElementById('account-register');
        const accountLoggedin = document.getElementById('account-loggedin');

        if (accountMenu) accountMenu.style.display = 'none';
        if (accountLogin) accountLogin.style.display = 'block';
        if (accountRegister) accountRegister.style.display = 'none';
        if (accountLoggedin) accountLoggedin.style.display = 'none';

        clearAccountMessages();

        // 清空输入框
        const loginUsername = document.getElementById('login-username');
        const loginPassword = document.getElementById('login-password');
        if (loginUsername) loginUsername.value = '';
        if (loginPassword) loginPassword.value = '';
    };

    window.showAccountRegister = function() {
        const accountMenu = document.getElementById('account-menu');
        const accountLogin = document.getElementById('account-login');
        const accountRegister = document.getElementById('account-register');
        const accountLoggedin = document.getElementById('account-loggedin');

        if (accountMenu) accountMenu.style.display = 'none';
        if (accountLogin) accountLogin.style.display = 'none';
        if (accountRegister) accountRegister.style.display = 'block';
        if (accountLoggedin) accountLoggedin.style.display = 'none';

        clearAccountMessages();

        // 清空输入框
        const registerUsername = document.getElementById('register-username');
        const registerPassword = document.getElementById('register-password');
        const registerConfirm = document.getElementById('register-confirm');
        if (registerUsername) registerUsername.value = '';
        if (registerPassword) registerPassword.value = '';
        if (registerConfirm) registerConfirm.value = '';
    };

    window.backToAccountMenu = function() {
        const accountMenu = document.getElementById('account-menu');
        const accountLogin = document.getElementById('account-login');
        const accountRegister = document.getElementById('account-register');
        const accountLoggedin = document.getElementById('account-loggedin');

        if (accountMenu) accountMenu.style.display = 'block';
        if (accountLogin) accountLogin.style.display = 'none';
        if (accountRegister) accountRegister.style.display = 'none';
        if (accountLoggedin) accountLoggedin.style.display = 'none';

        clearAccountMessages();
    };

    window.showLoggedInStatus = function() {
        if (!gameInstance || !gameInstance.accountSystem) return;

        const username = gameInstance.accountSystem.getCurrentUser();
        const loggedinUsername = document.getElementById('loggedin-username');
        const accountMenu = document.getElementById('account-menu');
        const accountLogin = document.getElementById('account-login');
        const accountRegister = document.getElementById('account-register');
        const accountLoggedin = document.getElementById('account-loggedin');
        const userDisplay = document.getElementById('current-user');

        if (loggedinUsername) {
            loggedinUsername.textContent = username;
        }

        if (accountMenu) accountMenu.style.display = 'none';
        if (accountLogin) accountLogin.style.display = 'none';
        if (accountRegister) accountRegister.style.display = 'none';
        if (accountLoggedin) accountLoggedin.style.display = 'block';

        // 更新当前用户显示
        if (userDisplay) {
            userDisplay.style.display = 'block';
            userDisplay.innerHTML = `👤 ${username}`;
        }
    };

    // 处理登录
    window.handleLogin = function() {
        const username = document.getElementById('login-username');
        const password = document.getElementById('login-password');

        if (!username || !password) {
            showAccountMessage('login-message', '请输入用户名和密码', 'error');
            return;
        }

        const usernameVal = username.value.trim();
        const passwordVal = password.value.trim();

        if (!usernameVal || !passwordVal) {
            showAccountMessage('login-message', '请输入用户名和密码', 'error');
            return;
        }

        if (!gameInstance || !gameInstance.accountSystem) {
            showAccountMessage('login-message', '游戏系统未初始化', 'error');
            return;
        }

        const result = gameInstance.accountSystem.login(usernameVal, passwordVal);

        if (result.success) {
            showAccountMessage('login-message', '登录成功！', 'success');

            // 加载账号数据
            if (result.gameData) {
                gameInstance.accountSystem.applyGameData(gameInstance.player, result.gameData);
            }

            // 延迟关闭面板
            setTimeout(() => {
                hideAccountPanel();
                showLoggedInStatus();
            }, 1500);
        } else {
            showAccountMessage('login-message', result.message, 'error');
        }
    };

    // 处理注册
    window.handleRegister = function() {
        const username = document.getElementById('register-username');
        const password = document.getElementById('register-password');
        const confirm = document.getElementById('register-confirm');

        if (!username || !password || !confirm) {
            showAccountMessage('register-message', '请填写所有字段', 'error');
            return;
        }

        const usernameVal = username.value.trim();
        const passwordVal = password.value.trim();
        const confirmVal = confirm.value.trim();

        if (!usernameVal || !passwordVal || !confirmVal) {
            showAccountMessage('register-message', '请填写所有字段', 'error');
            return;
        }

        if (passwordVal !== confirmVal) {
            showAccountMessage('register-message', '两次输入的密码不一致', 'error');
            return;
        }

        if (usernameVal.length < 3 || usernameVal.length > 20) {
            showAccountMessage('register-message', '用户名长度必须在3-20字符之间', 'error');
            return;
        }

        if (passwordVal.length < 3 || passwordVal.length > 20) {
            showAccountMessage('register-message', '密码长度必须在3-20字符之间', 'error');
            return;
        }

        if (!gameInstance || !gameInstance.accountSystem) {
            showAccountMessage('register-message', '游戏系统未初始化', 'error');
            return;
        }

        const result = gameInstance.accountSystem.createAccount(usernameVal, passwordVal);

        if (result.success) {
            showAccountMessage('register-message', '注册成功！请登录', 'success');

            // 延迟切换到登录界面
            setTimeout(() => {
                showAccountLogin();
            }, 1500);
        } else {
            showAccountMessage('register-message', result.message, 'error');
        }
    };

    // 处理登出
    window.handleLogout = function() {
        if (!gameInstance || !gameInstance.accountSystem) return;

        gameInstance.accountSystem.logout();

        // 隐藏用户显示
        const userDisplay = document.getElementById('current-user');
        if (userDisplay) userDisplay.style.display = 'none';

        // 返回主菜单
        backToAccountMenu();

        showAccountMessage('login-message', '已登出', 'success');
    };

    // 显示账号消息
    function showAccountMessage(elementId, message, type) {
        const element = document.getElementById(elementId);
        if (!element) return;

        element.textContent = message;
        element.className = `message ${type}`;
        element.style.display = 'block';

        // 3秒后自动隐藏
        setTimeout(() => {
            element.style.display = 'none';
        }, 3000);
    }

    // 清除账号消息
    function clearAccountMessages() {
        const loginMsg = document.getElementById('login-message');
        const registerMsg = document.getElementById('register-message');

        if (loginMsg) {
            loginMsg.style.display = 'none';
            loginMsg.textContent = '';
        }

        if (registerMsg) {
            registerMsg.style.display = 'none';
            registerMsg.textContent = '';
        }
    }

    // ===== 辅助函数：绘制带白底黑边框的文字 =====
    function drawTextWithBorder(ctx, text, x, y, options = {}) {
      const {
        font = '24px "Arial", sans-serif',
        textAlign = 'center',
        textBaseline = 'middle',
        borderColor = 'black',
        borderWidth = 3,
        fillColor = 'white'
      } = options;

      ctx.save();
      ctx.font = font;
      ctx.textAlign = textAlign;
      ctx.textBaseline = textBaseline;

      // 绘制黑色边框
      ctx.shadowColor = borderColor;
      ctx.shadowBlur = borderWidth;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
      ctx.fillStyle = fillColor;
      ctx.fillText(text, x, y);

      // 绘制白色填充
      ctx.shadowBlur = 0;
      ctx.fillStyle = fillColor;
      ctx.fillText(text, x, y);

      ctx.restore();
    }

    // ===== 辅助函数：绘制带白底黑边框的矩形按钮文字 =====
    function drawButtonTextWithBorder(ctx, text, x, y, width, height, options = {}) {
      const {
        font = 'bold 20px "Arial", sans-serif',
        borderColor = 'black',
        borderWidth = 3,
        fillColor = 'white'
      } = options;

      drawTextWithBorder(ctx, text, x + width/2, y + height/2, {
        font,
        textAlign: 'center',
        textBaseline: 'middle',
        borderColor,
        borderWidth,
        fillColor
      });
    }

    // ===== 初始化 DOM =====
    function initDOMElements() {
      screen = document.getElementById('gameCanvas');
      if (!screen) throw new Error("❌ Canvas #gameCanvas not found!");

      // 设置 canvas 尺寸为窗口大小
      screen.width = window.innerWidth;
      screen.height = window.innerHeight;

      ctx = screen.getContext('2d');
      window.WIDTH = screen.width;
      window.HEIGHT = screen.height;
    }

    // ===== 创建游戏实例 =====
    function createGameInstance() {
      try {
        const game = new WorldMapGame();
        gameInstance = game;

        // ===== 关键：挂载到 window =====
        window.gameInstance = game;

        // 自动加入房间（如果URL有参数）
        if (window.URL_PARAMS?.roomCode) {
          setTimeout(async () => {
            try {
              await game.joinMultiplayerRoom(window.URL_PARAMS.roomCode);
              startGame('Plain');
            } catch (error) {
              console.error('自动加入房间失败:', error);
            }
          }, 2000);
        }

        return game;
      } catch (error) {
        console.error("❌ Error creating game instance:", error);
        return null;
      }
    }

    // ===== 获取 Canvas 坐标 =====
    function getCanvasCoordinates(e) {
      const rect = screen.getBoundingClientRect();
      const scaleX = screen.width / rect.width;
      const scaleY = screen.height / rect.height;
      const x = (e.clientX - rect.left) * scaleX;
      const y = (e.clientY - rect.top) * scaleY;
      return { x, y };
    }

    // ===== 重置鼠标移动状态 =====
    function resetMouseMove() {
      mouseTargetX = null;
      mouseTargetY = null;
      isMouseMoving = false;
    }

    // ===== 设置鼠标移动目标 =====
    function setMouseTarget(x, y) {
      if (gameState === 'in_game' && gameInstance?.player) {
        // 转换为世界坐标（考虑相机偏移）
        const worldX = x + (gameInstance.cameraOffset?.x || 0);
        const worldY = y + (gameInstance.cameraOffset?.y || 0);

        mouseTargetX = worldX;
        mouseTargetY = worldY;
        isMouseMoving = true;
      }
    }

    // ===== 更新玩家位置通过鼠标移动 =====
    function updatePlayerMovementByMouse() {
      if (!isMouseMoving || !gameInstance?.player || mouseTargetX === null || mouseTargetY === null) {
        return;
      }

      const player = gameInstance.player;
      const playerX = player.physicsBody?.position?.x || player.x || 0;
      const playerY = player.physicsBody?.position?.y || player.y || 0;

      // 计算方向
      const dx = mouseTargetX - playerX;
      const dy = mouseTargetY - playerY;
      const distance = Math.sqrt(dx * dx + dy * dy);

      // 如果已经到达目标附近，停止移动
      if (distance < MOUSE_MOVE_SPEED) {
        if (player.physicsBody?.position) {
          player.physicsBody.position.x = mouseTargetX;
          player.physicsBody.position.y = mouseTargetY;
        } else {
          player.x = mouseTargetX;
          player.y = mouseTargetY;
        }
        resetMouseMove();
      } else {
        // 向目标移动
        const angle = Math.atan2(dy, dx);
        const moveX = Math.cos(angle) * MOUSE_MOVE_SPEED;
        const moveY = Math.sin(angle) * MOUSE_MOVE_SPEED;

        if (player.physicsBody?.position) {
          player.physicsBody.position.x += moveX;
          player.physicsBody.position.y += moveY;
        } else {
          player.x += moveX;
          player.y += moveY;
        }
      }

      // 更新相机
      if (gameInstance.cameraOffset) {
        const currentX = player.physicsBody?.position?.x || player.x || 0;
        const currentY = player.physicsBody?.position?.y || player.y || 0;
        gameInstance.cameraOffset.x = currentX - window.WIDTH / 2;
        gameInstance.cameraOffset.y = currentY - window.HEIGHT / 2;
      }
    }

    // ===== 检查点是否在背包区域内 =====
    function isPointInInventoryArea(x, y) {
      return x >= 0 && x <= 400;
    }

    // ===== 检查是否点击了关闭按钮 =====
    function isPointInCloseButton(x, y) {
      const closeX = 370;
      const closeY = 30;
      const distance = Math.sqrt(Math.pow(x - closeX, 2) + Math.pow(y - closeY, 2));
      return distance <= 15;
    }

    // ===== 打开背包 =====
    function openInventory() {
      if (!gameInstance?.player?.inventory) {
        console.warn('No inventory available');
        if (!gameInstance) {
          gameInstance = createGameInstance();
        }
        if (!gameInstance?.player?.inventory) {
          alert('Inventory system not available. Please start a game first.');
          return;
        }
      }

      if (gameInstance.player.inventory.craftingSystem) {
        gameInstance.player.inventory.craftingSystem.craftingVisible = false;
      }

      gameState = 'inventory';
    }

    // ===== 打开合成界面 =====
    function openCrafting() {
      if (!gameInstance?.player?.inventory?.craftingSystem) {
        console.warn('No crafting system available');
        if (!gameInstance) {
          gameInstance = createGameInstance();
        }
        if (!gameInstance?.player?.inventory?.craftingSystem) {
          alert('Crafting system not available. Please start a game first.');
          return;
        }
      }

      gameInstance.player.inventory.craftingSystem.craftingVisible = true;
      gameState = 'crafting';
    }

    // ===== 关闭背包 =====
    function closeInventory() {
      gameState = 'in_game';
    }

    // ===== 手动处理背包点击 =====
    function handleInventoryClick(x, y) {
      if (!gameInstance?.player?.inventory) return false;

      const inventory = gameInstance.player.inventory;
      const items = inventory.items;
      if (!items || items.length === 0) return false;

      const areaX = 20;
      const areaY = 80;
      const slotSize = 70;
      const slotMargin = 10;
      const cols = 3;
      const maxVisibleRows = 6;
      const titleHeight = 50;

      if (x < areaX || x > areaX + 340 || y < areaY || y > areaY + (window.innerHeight - 150)) {
        return false;
      }

      const RARITY_ORDER = ["Omega","Super", "Ultra", "Mythic", "Legendary", "Epic", "Rare", "Unusual", "Common"];
      const sortedItems = [...items].sort((a, b) => {
        const aIdx = RARITY_ORDER.indexOf(a.rarity);
        const bIdx = RARITY_ORDER.indexOf(b.rarity);
        return (aIdx === -1 ? 999 : aIdx) - (bIdx === -1 ? 999 : bIdx);
      });

      const startIndex = inventory.scrollOffset * cols;
      const visibleItems = sortedItems.slice(startIndex, startIndex + maxVisibleRows * cols);

      const relX = x - areaX - slotMargin;
      const relY = y - areaY - titleHeight;
      const col = Math.floor(relX / (slotSize + slotMargin));
      const row = Math.floor(relY / (slotSize + slotMargin));
      const clickedIndex = row * cols + col;

      if (col < 0 || col >= cols || row < 0 || row >= maxVisibleRows || clickedIndex >= visibleItems.length) {
        return false;
      }

      const item = visibleItems[clickedIndex];
      if (!item) return false;

      const originalIndex = items.findIndex(origItem =>
        origItem === item ||
        (origItem.type === item.type &&
         origItem.rarity === item.rarity &&
         origItem.level === item.level &&
         origItem.count >= item.count)
      );

      if (originalIndex === -1) return false;

      return addItemToQuickSlot(item, originalIndex);
    }

    // ===== 手动添加物品到快捷栏 =====
    function addItemToQuickSlot(item, itemIndex) {
      if (!gameInstance?.player?.quickSlot || !gameInstance?.player?.inventory) return false;

      const quickSlot = gameInstance.player.quickSlot;
      const inventory = gameInstance.player.inventory;
      const items = inventory.items;

      if (!Array.isArray(items) || itemIndex < 0 || itemIndex >= items.length) return false;

      const targetItem = items[itemIndex];
      if (!targetItem) return false;

      for (let i = 0; i < quickSlot.slots.length; i++) {
        if (!quickSlot.slots[i]) {
          if (targetItem.count > 1) {
            targetItem.count--;
            const newItem = new Item(item.type, item.level || 1, item.rarity);
            newItem.count = 1;
            quickSlot.slots[i] = newItem;
          } else {
            const movedItem = items.splice(itemIndex, 1)[0];
            movedItem.count = 1;
            quickSlot.slots[i] = movedItem;
          }
          quickSlot.updateAllPetals?.();
          return true;
        }
      }

      for (let i = 0; i < quickSlot.slots.length; i++) {
        const slotItem = quickSlot.slots[i];
        if (slotItem && slotItem.type === item.type && slotItem.rarity === item.rarity) {
          if (targetItem.count > 1) {
            targetItem.count--;
          } else {
            items.splice(itemIndex, 1);
          }
          slotItem.count = (slotItem.count || 1) + 1;
          quickSlot.updatePetalFromSlot?.(i);
          return true;
        }
      }

      return false;
    }

    // ===== 鼠标事件处理 =====
    function handleMouseDown(e) {
        e.preventDefault();
        const { x, y } = getCanvasCoordinates(e);

        // 如果是游戏内且是右键，设置鼠标移动目标
        if (gameState === 'in_game' && e.button === 2) {
            setMouseTarget(x, y);
        }

        const event = {
            type: 'mousedown',
            button: e.button,
            x,
            y
        };

        if (gameState === 'main_menu' && gameInstance?.mainMenu) {
            const result = gameInstance.mainMenu.handleClick(event);
            console.log('📋 Main menu click result:', result);

            if (result) {
                if (result.startsWith('start_') && result.endsWith('_map')) {
                    let biome = result.replace('start_', '').replace('_map', '');
                    biome = biome.charAt(0).toUpperCase() + biome.slice(1);
                    startGame(biome);
                } else if (result === 'start_maze') {
                    startMazeMode();
                } else if (result === 'inventory') {
                    openInventory();
                } else if (result === 'crafting') {
                    openCrafting();
                } else if (result === 'multiplayer') {
                    showMultiplayerPanel();
                } else if (result === 'account') {
                    showAccountPanel();
                } else if (result === 'bonus') {
                    console.log('Bonus button clicked');
                    if (gameInstance.bonusSystem?.claimBonus) {
                        gameInstance.bonusSystem.claimBonus();
                    }
                } else if (result === 'quit') {
                    // 处理退出
                }
            }
        } else if (gameState === 'in_game' && gameInstance?.handleEvents) {
            gameInstance.handleEvents(event);
        } else if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) {
            const crafting = gameInstance.player.inventory.craftingSystem;
            if (crafting.handleMouseDown) {
                crafting.handleMouseDown([x, y]);
            }
        } else if (gameState === 'inventory' && gameInstance?.player?.inventory) {
            // 检查是否点击了关闭按钮
            if (isPointInCloseButton(x, y)) {
                closeInventory();
                return;
            }

            // 检查是否点击了背包区域内的物品
            if (isPointInInventoryArea(x, y)) {
                if (gameInstance.player.inventory.handleMouseDown) {
                    gameInstance.player.inventory.handleMouseDown([x, y]);
                }
            }
        }
    }

    function handleMouseUp(e) {
        e.preventDefault();
        const { x, y } = getCanvasCoordinates(e);

        const event = { type: 'mouseup', button: e.button, x, y };

        if (gameState === 'in_game' && gameInstance?.handleEvents) {
            gameInstance.handleEvents(event);
            const clickEvent = { type: 'click', x, y };
            gameInstance.handleEvents(clickEvent);
        } else if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) {
            const crafting = gameInstance.player.inventory.craftingSystem;
            if (crafting.handleMouseUp) crafting.handleMouseUp([x, y]);
            if (crafting.handleClick) crafting.handleClick([x, y]);
        } else if (gameState === 'inventory' && gameInstance?.player?.inventory) {
            if (isPointInCloseButton(x, y)) {
                closeInventory();
                return;
            }
            if (isPointInInventoryArea(x, y)) {
                if (gameInstance.player.inventory.handleMouseUp) {
                    gameInstance.player.inventory.handleMouseUp([x, y]);
                }
                handleInventoryClick(x, y);
            }
        }
    }

    function handleMouseMove(e) {
        e.preventDefault();
        const { x, y } = getCanvasCoordinates(e);
        const event = { type: 'mousemove', x, y };

        if (gameState === 'main_menu' && gameInstance?.mainMenu?.handleMouseMove) {
            gameInstance.mainMenu.handleMouseMove(event);
        } else if (gameState === 'in_game' && gameInstance?.handleEvents) {
            gameInstance.handleEvents(event);
            if (gameInstance.player?.updateMousePosition) {
                gameInstance.player.updateMousePosition(x, y);
            }
        } else if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) {
            const crafting = gameInstance.player.inventory.craftingSystem;
            if (crafting.handleMouseMove) crafting.handleMouseMove([x, y]);
        } else if (gameState === 'inventory' && gameInstance?.player?.inventory) {
            if (isPointInInventoryArea(x, y)) {
                if (gameInstance.player.inventory.handleMouseMove) {
                    gameInstance.player.inventory.handleMouseMove([x, y]);
                }
            }
        }
    }

    function handleWheel(e) {
        e.preventDefault();
        const { x, y } = getCanvasCoordinates(e);
        const event = { type: 'wheel', deltaY: e.deltaY, x, y };

        if (gameState === 'in_game' && gameInstance?.handleEvents) {
            gameInstance.handleEvents(event);
        } else if (gameState === 'crafting' && gameInstance?.player?.inventory?.craftingSystem) {
            const crafting = gameInstance.player.inventory.craftingSystem;
            if (crafting.handleScrollWheel) crafting.handleScrollWheel(event);
        } else if (gameState === 'inventory' && gameInstance?.player?.inventory) {
            if (isPointInInventoryArea(x, y)) {
                if (gameInstance.player.inventory.handleScrollWheel) {
                    gameInstance.player.inventory.handleScrollWheel(event);
                }
            }
        }
    }

    // ===== 初始化玩家控制 =====
    function initializePlayerControls() {
      if (controlsInitialized) {
        screen.removeEventListener('mousedown', handleMouseDown);
        screen.removeEventListener('mouseup', handleMouseUp);
        screen.removeEventListener('mousemove', handleMouseMove);
        screen.removeEventListener('wheel', handleWheel);
      }

      screen.addEventListener('mousedown', handleMouseDown);
      screen.addEventListener('mouseup', handleMouseUp);
      screen.addEventListener('mousemove', handleMouseMove);
      screen.addEventListener('wheel', handleWheel, { passive: false });
      screen.addEventListener('contextmenu', (e) => e.preventDefault());

      controlsInitialized = true;
    }

    // ===== 键盘事件处理 =====
    function handleKeyDown(e) {
      const key = e.key;

      // T键打开聊天
      if (key === 't' || key === 'T') {
        if (gameInstance?.multiplayerMode && gameInstance?.network?.chatSystem) {
          gameInstance.toggleChat();
          if (gameInstance.chatVisible) {
            gameInstance.network.chatSystem.inputActive = true;
          }
        }
        e.preventDefault();
        return;
      }

      if (key >= '1' && key <= '8') {
        const index = parseInt(key) - 1;
        if (gameState === 'in_game' && gameInstance?.player?.quickSlot) {
          gameInstance.player.quickSlot.selectedIndex = index;
          gameInstance.player.quickSlot.useItem(index);
        }
        e.preventDefault();
        return;
      }

      if (key === ' ') {
        if (gameState === 'in_game' && gameInstance?.player) {
          gameInstance.player.toggleSpreadMode();
        }
        e.preventDefault();
        return;
      }

      if (key === 'c' || key === 'C') {
        if (gameState === 'in_game') {
          openCrafting();
        } else if (gameState === 'crafting') {
          gameState = 'in_game';
          if (gameInstance.player?.inventory?.craftingSystem) {
            gameInstance.player.inventory.craftingSystem.craftingVisible = false;
          }
        }
        e.preventDefault();
        return;
      }

      if (key === 'i' || key === 'I') {
        if (gameState === 'in_game') {
          openInventory();
        } else if (gameState === 'inventory') {
          gameState = 'in_game';
        }
        e.preventDefault();
        return;
      }

      if (key === 'Escape') {
        e.preventDefault();
        e.stopPropagation();
        if (gameState !== 'main_menu') {
          returnToMainMenu();
        }
      }

      if (['w', 'a', 's', 'd', 'arrowup', 'arrowdown', 'arrowleft', 'arrowright'].includes(key.toLowerCase())) {
        resetMouseMove();
      }
    }

    function handleKeyUp(e) {}

    // ===== 专门的 S 键监听（静止模式）=====
    document.addEventListener('keydown', function(e) {
      if (e.key === 's' || e.key === 'S') {
        const game = window.gameInstance;
        if (game && game.gameState === 'in_game' && !game.paused && game.player) {
          e.preventDefault();
          e.stopPropagation();

          console.log('S键被按下，切换静止模式');

          let count = 0;
          for (const petal of game.player.petals) {
            if (petal.toggleStillMode) {
              petal.toggleStillMode();
              count++;
            }
          }
          console.log(`✅ 静止模式已切换 (${count} 个花瓣)`);
        }
      }
    });

    // ===== 返回主菜单 =====
    function returnToMainMenu() {
      if (gameInstance?.autoSave) gameInstance.autoSave();

      if (gameInstance?.player?.inventory?.craftingSystem) {
        gameInstance.player.inventory.craftingSystem.craftingVisible = false;
      }

      gameState = 'main_menu';
      editorMode = false;

      if (gameInstance) gameInstance.gameState = 'main_menu';
      resetMouseMove();
    }

    // ===== 开始游戏 =====
    async function startGame(biome) {
        console.log('🎮 Starting game with biome:', biome);

        if (!gameInstance) {
            gameInstance = createGameInstance();
            if (!gameInstance) {
                alert('Failed to create game instance!');
                return;
            }
        }

        try {
            // 确保世界尺寸有效
            if (typeof WORLD_WIDTH === 'undefined') {
                window.WORLD_WIDTH = 5000;
            }
            if (typeof WORLD_HEIGHT === 'undefined') {
                window.WORLD_HEIGHT = 5000;
            }

            // 调用游戏实例的 startGame 方法
            await gameInstance.startGame(biome);

            gameState = 'in_game';
            editorMode = false;
            console.log('Game started, state:', gameState);

            if (!controlsInitialized) {
                initializePlayerControls();
            }

            // 重置鼠标移动状态
            resetMouseMove();

        } catch (error) {
            console.error('Error starting game:', error);
            alert('Failed to start game: ' + error.message);
        }
    }

    async function startMazeMode() {
        console.log('🗺️ Starting maze mode');

        if (!gameInstance) {
            gameInstance = createGameInstance();
            if (!gameInstance) {
                alert('Failed to create game instance!');
                return;
            }
        }

        try {
            // 设置迷宫参数
            if (typeof MAZE_WIDTH === 'undefined') {
                window.MAZE_WIDTH = 10000;
            }
            if (typeof MAZE_HEIGHT === 'undefined') {
                window.MAZE_HEIGHT = 10000;
            }

            // 调用游戏实例的 startMazeMode 方法
            gameInstance.startMazeMode();

            gameState = 'in_game';
            editorMode = true;
            console.log('Maze mode started, editor:', editorMode);

            if (!controlsInitialized) {
                initializePlayerControls();
            }

            resetMouseMove();

        } catch (error) {
            console.error('Error starting maze mode:', error);
            alert('Failed to start maze mode: ' + error.message);
        }
    }

    // ===== 游戏主循环 =====
    function gameLoop() {
      animationFrameId = requestAnimationFrame(gameLoop);

      if (!gameInstance) return;

      const dt = 16.67 / 1000;

      if (gameState === 'in_game') {
        updatePlayerMovementByMouse();
      }

      if (gameState === 'in_game' && gameInstance.update) {
        gameInstance.update(dt);
      } else if (gameState === 'crafting' && gameInstance.player?.inventory?.craftingSystem?.update) {
        gameInstance.player.inventory.craftingSystem.update(dt);
      } else if (gameState === 'inventory' && gameInstance.player?.inventory?.update) {
        gameInstance.player.inventory.update(dt);
      }

      if (gameState === 'main_menu') {
        ctx.clearRect(0, 0, screen.width, screen.height);
        ctx.fillStyle = '#1a1a2e';
        ctx.fillRect(0, 0, screen.width, screen.height);

        if (gameInstance?.mainMenu) {
          gameInstance.mainMenu.draw(ctx);

          // 添加迷宫模式按钮
          ctx.save();
          const btnWidth = 200;
          const btnHeight = 50;
          const btnX = screen.width/2 - btnWidth/2;
          const btnY = screen.height/2 + 440;

          ctx.fillStyle = '#8B4513';
          ctx.fillRect(btnX, btnY, btnWidth, btnHeight);
          ctx.strokeStyle = '#CD853F';
          ctx.lineWidth = 2;
          ctx.strokeRect(btnX, btnY, btnWidth, btnHeight);

          drawButtonTextWithBorder(ctx, 'MAZE MODE', btnX, btnY, btnWidth, btnHeight, {
            font: 'bold 20px "Arial", sans-serif',
            fillColor: '#FFD700'
          });
          ctx.restore();
        } else {
          drawFallbackMenu(ctx);
        }
      } else if (gameState === 'in_game') {
        ctx.clearRect(0, 0, screen.width, screen.height);
        gameInstance.draw(ctx);

        let hints = '右键点击地面移动 | C: 合成 | I: 背包 | ESC: 菜单 | S: 静止 | T: 聊天';
        if (gameInstance.useMaze) {
          hints = '🗺️ 迷宫模式 | E: 编辑器 | S: 保存地图 | L: 加载地图 | M: 控制面板 | ' + hints;
        }

        drawTextWithBorder(ctx, hints, 10, 20, {
          font: '12px "Arial", sans-serif',
          textAlign: 'left',
          textBaseline: 'top',
          borderWidth: 2
        });

        if (gameInstance.editorMode) {
          drawTextWithBorder(ctx, '🔨 编辑器模式 - 点击清除墙壁 | Shift+点击放置墙壁', screen.width/2, 50, {
            font: '16px "Arial", sans-serif',
            textAlign: 'center',
            textBaseline: 'top',
            borderWidth: 2,
            fillColor: '#FFA500'
          });
        }

        if (isMouseMoving && mouseTargetX !== null && mouseTargetY !== null && gameInstance.cameraOffset) {
          const screenX = mouseTargetX - gameInstance.cameraOffset.x;
          const screenY = mouseTargetY - gameInstance.cameraOffset.y;

          if (screenX >= 0 && screenX <= screen.width && screenY >= 0 && screenY <= screen.height) {
            ctx.save();
            ctx.strokeStyle = 'rgba(255, 255, 0, 0.8)';
            ctx.fillStyle = 'rgba(255, 255, 0, 0.3)';
            ctx.lineWidth = 2;

            ctx.beginPath();
            ctx.arc(screenX, screenY, 15, 0, Math.PI * 2);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(screenX, screenY, 8, 0, Math.PI * 2);
            ctx.fill();

            ctx.beginPath();
            ctx.moveTo(screenX - 20, screenY);
            ctx.lineTo(screenX + 20, screenY);
            ctx.moveTo(screenX, screenY - 20);
            ctx.lineTo(screenX, screenY + 20);
            ctx.strokeStyle = 'rgba(255, 255, 0, 0.5)';
            ctx.stroke();

            ctx.restore();
          }
        }

      } else if (gameState === 'crafting' && gameInstance.player?.inventory?.craftingSystem) {
        ctx.clearRect(0, 0, screen.width, screen.height);
        ctx.fillStyle = '#16213e';
        ctx.fillRect(0, 0, screen.width, screen.height);

        ctx.globalAlpha = 0.3;
        gameInstance.draw(ctx);
        ctx.globalAlpha = 1.0;

        const crafting = gameInstance.player.inventory.craftingSystem;
        crafting.craftingVisible = true;
        crafting.draw(ctx);

        drawTextWithBorder(ctx, 'ESC: 返回游戏', 10, 20, {
          font: '12px "Arial", sans-serif',
          textAlign: 'left',
          textBaseline: 'top',
          borderWidth: 2
        });

      } else if (gameState === 'inventory' && gameInstance.player?.inventory) {
        ctx.clearRect(0, 0, screen.width, screen.height);
        ctx.fillStyle = '#16213e';
        ctx.fillRect(0, 0, screen.width, screen.height);
        gameInstance.draw(ctx);

        ctx.save();
        ctx.beginPath();
        ctx.rect(0, 0, 400, screen.height);
        ctx.clip();

        ctx.fillStyle = 'rgba(30, 30, 50, 0.9)';
        ctx.fillRect(0, 0, 400, screen.height);
        ctx.strokeStyle = 'rgba(200, 200, 200, 0.8)';
        ctx.lineWidth = 2;
        ctx.strokeRect(2, 2, 396, screen.height - 4);

        drawTextWithBorder(ctx, 'INVENTORY', 200, 50, {
          font: 'bold 28px "Arial", sans-serif',
          textAlign: 'center',
          textBaseline: 'middle',
          borderWidth: 3
        });

        ctx.fillStyle = '#ff6b6b';
        ctx.beginPath();
        ctx.arc(370, 30, 15, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
        drawTextWithBorder(ctx, 'X', 370, 30, {
          font: 'bold 18px "Arial", sans-serif',
          textAlign: 'center',
          textBaseline: 'middle',
          borderWidth: 2,
          fillColor: 'white'
        });

        if (gameInstance.player.inventory.draw) {
          gameInstance.player.inventory.draw(ctx);
        }

        ctx.restore();

        if (gameInstance.player?.quickSlot?.draw) {
          gameInstance.player.quickSlot.draw(ctx);
        }

        drawTextWithBorder(ctx, '点击物品添加到快捷栏 | ESC: 返回游戏', 10, screen.height - 10, {
          font: '12px "Arial", sans-serif',
          textAlign: 'left',
          textBaseline: 'bottom',
          borderWidth: 2
        });
      }
    }

    // ===== 回退菜单绘制 =====
    function drawFallbackMenu(ctx) {
      ctx.fillStyle = '#1a1a2e';
      ctx.fillRect(0, 0, screen.width, screen.height);

      drawTextWithBorder(ctx, '🌸 flwrr 🌸', screen.width/2, screen.height/2 - 100, {
        font: '48px "Arial", sans-serif',
        textAlign: 'center',
        textBaseline: 'middle',
        borderWidth: 4
      });

      drawTextWithBorder(ctx, 'Click to Start', screen.width/2, screen.height/2, {
        font: '24px "Arial", sans-serif',
        textAlign: 'center',
        textBaseline: 'middle',
        borderWidth: 3,
        fillColor: '#888'
      });

      const buttons = [
        { text: 'Plain', y: screen.height/2 + 80 },
        { text: 'Bio', y: screen.height/2 + 140 },
        { text: 'Desert', y: screen.height/2 + 200 },
        { text: 'Random', y: screen.height/2 + 260 },
        { text: 'Crafting', y: screen.height/2 + 320 },
        { text: 'Inventory', y: screen.height/2 + 380 },
        { text: 'MAZE MODE', y: screen.height/2 + 440, color: '#8B4513' }
      ];

      buttons.forEach((btn) => {
        ctx.fillStyle = btn.color || '#4a4a6a';
        const btnWidth = 200;
        const btnHeight = 50;
        const btnX = screen.width/2 - btnWidth/2;

        ctx.fillRect(btnX, btn.y, btnWidth, btnHeight);
        ctx.strokeStyle = btn.color ? '#CD853F' : '#6a6a8a';
        ctx.strokeRect(btnX, btn.y, btnWidth, btnHeight);

        drawButtonTextWithBorder(ctx, btn.text, btnX, btn.y, btnWidth, btnHeight, {
          font: 'bold 20px "Arial", sans-serif',
          fillColor: btn.text === 'MAZE MODE' ? '#FFD700' : 'white',
          borderWidth: 2
        });
      });
    }

    // ===== 窗口大小调整 =====
    window.addEventListener('resize', () => {
      window.WIDTH = window.innerWidth;
      window.HEIGHT = window.innerHeight;
      screen.width = window.WIDTH;
      screen.height = window.HEIGHT;
      if (gameInstance) {
        gameInstance.screen = ctx;
      }
    });

    // ===== 键盘事件监听 =====
    document.addEventListener('keydown', handleKeyDown);
    document.addEventListener('keyup', handleKeyUp);

    // ===== 页面加载 =====
    window.addEventListener('load', () => {
      initDOMElements();
      gameInstance = createGameInstance();
      gameLoop();
      initializePlayerControls();

      // 检查账号面板元素
      setTimeout(() => {
          console.log('🔍 账号面板元素检查:', {
              'account-panel': document.getElementById('account-panel') ? '✅' : '❌',
              'account-menu': document.getElementById('account-menu') ? '✅' : '❌',
              'account-login': document.getElementById('account-login') ? '✅' : '❌',
              'account-register': document.getElementById('account-register') ? '✅' : '❌',
              'account-loggedin': document.getElementById('account-loggedin') ? '✅' : '❌'
          });
      }, 1000);
    });
    </script>
</body>
</html>
